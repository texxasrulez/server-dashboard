name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install npm dependencies
        run: npm ci

      - name: Lint PHP
        run: bash bin/php-lint.sh

      - name: Check formatting baseline
        run: npm run format:check:baseline

      - name: Run PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml.dist

      - name: Run browser smoke test
        run: bash bin/browser-smoke.sh
